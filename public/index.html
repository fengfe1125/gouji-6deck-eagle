<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#102018" />
  <title>6副牌带鹰够级｜手机 6 人联机</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div>
        <h1>6副牌带鹰够级</h1>
        <small>6 副牌 + 鹰 · 6 人手机联机</small>
      </div>
      <button id="copy" class="ghost">邀请</button>
    </header>

    <section id="lobby" class="panel lobby">
      <div class="brand">🦅</div>
      <label>昵称<input id="name" placeholder="例如：老王" maxlength="12" autocomplete="nickname" /></label>
      <button id="create" class="primary">创建房间</button>
      <div class="joinRow">
        <input id="joinCode" placeholder="输入房间码" autocapitalize="characters" />
        <button id="join">加入</button>
      </div>
      <p class="hint">创建房间后点右上角“邀请”，把链接发给另外 5 个人。6 人满员后开始，牌堆为 6 副牌 + 鹰。</p>
    </section>

    <main id="game" class="hidden">
      <section class="statusCard">
        <div>房间 <b id="code">未入房</b></div>
        <div id="turn" class="turnText">等待开局</div>
        <div id="last" class="lastPlay">桌面为空</div>
      </section>

      <section class="tableWrap">
        <div class="table" id="seats"></div>
        <button id="start" class="startBtn">满 6 人开始</button>
      </section>

      <section class="handPanel">
        <div class="handHeader">
          <b>我的手牌</b>
          <span id="selectedInfo">未选牌</span>
        </div>
        <div id="cards" class="cards"></div>
        <div class="actionBar">
          <button id="pass" class="ghost">过牌</button>
          <button id="play" class="primary">出牌</button>
        </div>
      </section>

      <section class="logPanel">
        <h3>记录 / 贡牌提示</h3>
        <div id="log"></div>
      </section>
    </main>

    <div id="toast"></div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
