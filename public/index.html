<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="screen-orientation" content="landscape" />
  <meta name="theme-color" content="#0b2417" />
  <title>6副牌带鹰够级｜横屏版</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="rotateTip">📱 请把手机横过来，横屏打牌更舒服</div>
  <div id="app">
    <header class="topbar">
      <div class="titleBlock">
        <div class="logo">🦅</div>
        <div><h1>6副牌带鹰够级</h1><small>横屏 · 6 人 · 房间联机 · AI 测试</small></div>
      </div>
      <div class="topActions">
        <button id="copy" class="ghost">邀请</button>
      </div>
    </header>

    <section id="lobby" class="panel lobby">
      <div class="hero">
        <div class="brand">🦅</div>
        <div><h2>山东够级·带鹰横屏版</h2><p>参考手机棋牌桌风格：中央牌桌、六方座位、底部手牌区。</p></div>
      </div>
      <label>昵称<input id="name" placeholder="例如：老王" maxlength="12" autocomplete="nickname" /></label>
      <div class="lobbyBtns">
        <button id="create" class="primary">创建房间</button>
        <button id="quickTest" class="goldGhost">一键测试：我 + 5 个AI</button>
      </div>
      <div class="joinRow"><input id="joinCode" placeholder="输入房间码" autocapitalize="characters" /><button id="join">加入</button></div>
      <p class="hint">6 人满员可开局；也可以直接测试模式，让 5 个 AI 陪你出牌。建议手机横屏打开。</p>
    </section>

    <main id="game" class="hidden gameShell">
      <aside class="leftRail">
        <div class="roomCard"><span>房间</span><b id="code">未入房</b></div>
        <button id="start" class="primary">满 6 人开始</button>
        <button id="testMode" class="goldGhost">测试模式</button>
        <div class="ruleMini">6副牌 + 6鹰<br/>鹰最大，可挂牌<br/>AI：最小可管</div>
      </aside>

      <section class="tableWrap">
        <div class="table" id="seats">
          <div class="centerMat">
            <div id="turn" class="turnText">等待开局</div>
            <div id="last" class="lastPlay">桌面为空</div>
          </div>
        </div>
      </section>

      <aside class="rightRail logPanel">
        <h3>牌局记录</h3>
        <div id="log"></div>
      </aside>

      <section class="handPanel">
        <div class="handHeader"><b>我的手牌</b><span id="selectedInfo">未选牌</span></div>
        <div id="cards" class="cards"></div>
        <div class="actionBar"><button id="pass" class="ghost">过牌</button><button id="play" class="primary">出牌</button></div>
      </section>
    </main>
    <div id="toast"></div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
